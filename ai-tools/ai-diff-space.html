<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Output Diff Space - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-white">AI Output Diff Space</h1>
                    <p class="text-xs text-zinc-400 mt-1">Isolate computational generation drift and text modifications instantly.</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="calculateDiff()" class="bg-[#00FFC2] text-black text-xs font-bold px-4 py-1.5 rounded transition-all">Compute Diff</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Output Model Asset A</label>
                    <textarea id="diff-text-a" class="w-full h-44 bg-[#0F0F12] border border-zinc-800 rounded-xl p-3 text-xs text-zinc-300 focus:outline-none focus:border-[#635BFF]" placeholder="Paste base prompt model generation string details..."></textarea>
                </div>
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Output Model Asset B</label>
                    <textarea id="diff-text-b" class="w-full h-44 bg-[#0F0F12] border border-zinc-800 rounded-xl p-3 text-xs text-zinc-300 focus:outline-none focus:border-[#635BFF]" placeholder="Paste subsequent system inference run configuration text parameters..."></textarea>
                </div>
            </div>

            <div>
                <label class="text-xs font-mono text-zinc-400 block mb-1">Structural Discrepancy Map</label>
                <div id="diff-visual-output" class="w-full min-h-24 bg-black border border-zinc-900 rounded-xl p-4 text-xs font-mono whitespace-pre-wrap leading-relaxed text-zinc-400">
                    Calculated string structural mapping data metrics populates here...
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Sandbox Optimization</p>
    </footer>

    <script>
        function calculateDiff() {
            const a = document.getElementById('diff-text-a').value;
            const b = document.getElementById('diff-text-b').value;
            const output = document.getElementById('diff-visual-output');

            if(!a && !b) {
                output.innerHTML = "Inputs are empty.";
                return;
            }

            // Client-Side split configuration metric algorithm
            let wordsA = a.split(/(\s+)/);
            let wordsB = b.split(/(\s+)/);
            let resultHTML = "";

            let maxLength = Math.max(wordsA.length, wordsB.length);
            for(let i=0; i<maxLength; i++) {
                if(wordsA[i] === wordsB[i]) {
                    if(wordsA[i]) resultHTML += `<span>${wordsA[i]}</span>`;
                } else {
                    if(wordsA[i] && wordsA[i].trim()) resultHTML += `<span class="bg-red-900/40 text-red-400 px-0.5 rounded border border-red-800/30 line-through mx-0.5">${wordsA[i]}</span>`;
                    if(wordsB[i] && wordsB[i].trim()) resultHTML += `<span class="bg-emerald-900/40 text-[#00FFC2] px-0.5 rounded border border-emerald-800/30 mx-0.5">${wordsB[i]}</span>`;
                }
            }
            output.innerHTML = resultHTML || "No discrepancies isolated.";
        }
    </script>
</body>
</html>

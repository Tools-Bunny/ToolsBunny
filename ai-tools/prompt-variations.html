<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Variations Generator - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-white">Prompt Variations Generator</h1>
                    <p class="text-xs text-zinc-400 mt-1">Generate systematic variable layers for complex LLM prompt testing matrices.</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="alert('Bookmarked')" class="bg-zinc-800 px-3 py-1.5 text-xs rounded">⭐ Bookmark</button>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-xs font-mono text-zinc-400 block mb-1">Core Objective Prompt</label>
                    <input type="text" id="core-prompt" oninput="generateVariants()" class="w-full bg-[#0F0F12] border border-zinc-800 rounded-lg p-3 text-sm focus:outline-none focus:border-[#635BFF]" placeholder="e.g., Write a marketing script for a SaaS product">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-xs font-mono text-zinc-500 block mb-1">Perspective / Role Matrix</label>
                        <textarea id="roles-input" oninput="generateVariants()" class="w-full h-24 bg-[#0F0F12] border border-zinc-800 rounded-lg p-2 text-xs focus:outline-none focus:border-[#635BFF]">Expert Copywriter&#10;Skeptical Customer&#10;Technical CTO</textarea>
                    </div>
                    <div>
                        <label class="text-xs font-mono text-zinc-500 block mb-1">Tone Layers</label>
                        <textarea id="tones-input" oninput="generateVariants()" class="w-full h-24 bg-[#0F0F12] border border-zinc-800 rounded-lg p-2 text-xs focus:outline-none focus:border-[#635BFF]">Highly Professional&#10;Witty & Casual&#10;No-Nonsense Direct</textarea>
                    </div>
                    <div>
                        <label class="text-xs font-mono text-zinc-500 block mb-1">Structural Constraints</label>
                        <textarea id="constraints-input" oninput="generateVariants()" class="w-full h-24 bg-[#0F0F12] border border-zinc-800 rounded-lg p-2 text-xs focus:outline-none focus:border-[#635BFF]">Under 280 characters&#10;Use a numbered list&#10;Bold critical terms</textarea>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-mono text-zinc-400 block mb-1">Permutation Output Matrices</label>
                    <div id="variants-output" class="space-y-3 max-h-80 overflow-y-auto pr-2">
                        <div class="text-xs text-zinc-500 italic">Enter a core objective above to compute programmatically...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Client-Side Matrix Workspace</p>
    </footer>

    <script>
        function generateVariants() {
            const core = document.getElementById('core-prompt').value.trim();
            if (!core) {
                document.getElementById('variants-output').innerHTML = '<div class="text-xs text-zinc-500 italic">Enter a core objective above to compute programmatically...</div>';
                return;
            }

            const roles = document.getElementById('roles-input').value.split('\n').filter(Boolean);
            const tones = document.getElementById('tones-input').value.split('\n').filter(Boolean);
            const constraints = document.getElementById('constraints-input').value.split('\n').filter(Boolean);

            let html = "";
            let count = 1;

            roles.forEach(role => {
                tones.forEach(tone => {
                    constraints.forEach(constraint => {
                        const compiled = `Act as a ${role.trim()}. Tone: ${tone.trim()}. Objective: ${core}. Constraint: ${constraint.trim()}.`;
                        html += `
                            <div class="p-3 bg-[#0F0F12] border border-zinc-900 rounded-lg flex flex-col gap-2">
                                <div class="flex justify-between items-center"><span class="text-[10px] font-mono text-[#635BFF]">VARIANT #${count++}</span><button onclick="navigator.clipboard.writeText(this.nextElementSibling.innerText); alert('Copied!')" class="text-[10px] text-zinc-400 hover:text-white">Copy</button><span class="hidden">${compiled}</span></div>
                                <p class="text-xs text-zinc-300 font-mono">${compiled}</p>
                            </div>`;
                    });
                });
            });
            document.getElementById('variants-output').innerHTML = html;
        }
    </script>
</body>
</html>

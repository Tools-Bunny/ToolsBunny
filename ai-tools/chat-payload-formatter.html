<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat History Payload Formatter - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-white">Chat History Payload Formatter</h1>
                    <p class="text-xs text-zinc-400 mt-1">Convert raw conversational scripts into standard API message objects instantly.</p>
                </div>
                <button onclick="formatPayload()" class="bg-[#00FFC2] text-black text-xs font-bold px-4 py-1.5 rounded">Format JSON</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Raw Script (Prefix names with colon)</label>
                    <textarea id="chat-input" class="w-full h-72 bg-[#0F0F12] border border-zinc-800 rounded-xl p-3 text-xs text-zinc-300 focus:outline-none focus:border-[#635BFF]" placeholder="User: Hello there!&#10;Assistant: Hi! How can I help you today?"></textarea>
                </div>
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Valid JSON API Array Messages</label>
                    <textarea id="json-output" readonly class="w-full h-72 bg-[#0A0A0C] border border-zinc-900 rounded-xl p-3 text-xs text-zinc-400 focus:outline-none font-mono resize-none" placeholder="[{'role': 'user', 'content': '...'}]"></textarea>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Sandboxed Environment Processing</p>
    </footer>

    <script>
        function formatPayload() {
            const src = document.getElementById('chat-input').value.trim();
            if(!src) return;
            
            const lines = src.split('\n');
            const messages = [];
            
            lines.forEach(line => {
                const parts = line.split(/:(.*)/s);
                if (parts.length >= 2) {
                    let speaker = parts[0].trim().toLowerCase();
                    let content = parts[1].trim();
                    
                    let role = "user";
                    if(speaker.includes("assistant") || speaker.includes("bot") || speaker.includes("ai")) role = "assistant";
                    if(speaker.includes("system") || speaker.includes("admin")) role = "system";
                    
                    messages.push({ role: role, content: content });
                }
            });
            document.getElementById('json-output').value = JSON.stringify(messages, null, 2);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Browser History Metadata Sandbox - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <h1 class="text-2xl font-bold text-white border-b border-zinc-800 pb-4 mb-6">Local History Export Parser</h1>

            <div class="space-y-4">
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Paste Raw History Log / URL Listing Rows</label>
                    <textarea id="history-raw-log" oninput="parseLocalHistoryMetrics()" class="w-full h-32 bg-[#0F0F12] border border-zinc-800 rounded-xl p-3 text-xs text-zinc-300 font-mono focus:outline-none focus:border-[#635BFF]" placeholder="https://google.com&#10;https://toolsbunny.com&#10;https://google.com"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black p-3 border border-zinc-900 rounded-lg text-center">
                        <span class="text-[10px] font-mono text-zinc-500 block uppercase">Total Scanned Rows</span>
                        <span id="hist-total-rows" class="text-xl font-bold text-white mt-1 block">0</span>
                    </div>
                    <div class="bg-black p-3 border border-zinc-900 rounded-lg text-center">
                        <span class="text-[10px] font-mono text-zinc-500 block uppercase">Unique Tracked Links</span>
                        <span id="hist-unique-links" class="text-xl font-bold text-[#00FFC2] mt-1 block">0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Sandboxed Privacy Verification Nodes</p>
    </footer>

    <script>
        function parseLocalHistoryMetrics() {
            const raw = document.getElementById('history-raw-log').value.trim();
            if(!raw) {
                document.getElementById('hist-total-rows').textContent = "0";
                document.getElementById('hist-unique-links').textContent = "0";
                return;
            }

            const lines = raw.split('\n').filter(Boolean);
            const uniques = new Set(lines.map(l => l.trim()));

            document.getElementById('hist-total-rows').textContent = lines.length;
            document.getElementById('hist-unique-links').textContent = uniques.size;
        }
    </script>
</body>
</html>

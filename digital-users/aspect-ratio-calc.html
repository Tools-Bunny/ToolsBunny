<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspect Ratio Visualizer Calculator - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <h1 class="text-2xl font-bold text-white border-b border-zinc-800 pb-4 mb-6">Dimensional Aspect Scaling Node</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-[#0F0F12] border border-zinc-800 p-4 rounded-xl space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[10px] font-mono text-zinc-400 block mb-1">Width Factor</label>
                            <input type="number" id="ratio-w" value="16" oninput="calculateAspectRatio()" class="w-full bg-black border border-zinc-800 rounded p-1.5 text-xs text-white font-mono">
                        </div>
                        <div>
                            <label class="text-[10px] font-mono text-zinc-400 block mb-1">Height Factor</label>
                            <input type="number" id="ratio-h" value="9" oninput="calculateAspectRatio()" class="w-full bg-black border border-zinc-800 rounded p-1.5 text-xs text-white font-mono">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-mono text-zinc-400 block mb-1">Target Base Pixel Width (px)</label>
                        <input type="number" id="base-pixel-w" value="1920" oninput="calculateAspectRatio()" class="w-full bg-black border border-zinc-800 rounded p-2 text-xs text-white font-mono">
                    </div>
                </div>

                <div class="bg-black border border-zinc-900 rounded-xl p-5 flex flex-col justify-center text-center">
                    <span class="text-[10px] font-mono text-zinc-500 uppercase block">Computed Target Scaling Height</span>
                    <span id="ratio-calculated-height" class="text-4xl font-mono font-bold text-[#00FFC2] my-2">1080 px</span>
                    <span class="text-[10px] text-zinc-600 font-mono">Dynamic matrix evaluation via standalone core equations.</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Proportional Alignment Metrics</p>
    </footer>

    <script>
        function calculateAspectRatio() {
            const wRatio = parseFloat(document.getElementById('ratio-w').value) || 16;
            const hRatio = parseFloat(document.getElementById('ratio-h').value) || 9;
            const pixelsW = parseFloat(document.getElementById('base-pixel-w').value) || 0;

            const computedHeight = Math.round((pixelsW / wRatio) * hRatio);
            document.getElementById('ratio-calculated-height').textContent = `${computedHeight} px`;
        }
        calculateAspectRatio();
    </script>
</body>
</html>

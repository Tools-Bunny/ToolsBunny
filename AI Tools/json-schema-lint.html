<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Structured Schema Lint Space - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-white">JSON Structured Schema Lint Space</h1>
                    <p class="text-xs text-zinc-400 mt-1">Validate structural JSON responses against interface rules safely.</p>
                </div>
                <button onclick="validateSchemaJSON()" class="bg-[#00FFC2] text-black text-xs font-bold px-4 py-1.5 rounded">Lint Validation</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Target JSON Payload Instance</label>
                    <textarea id="json-target" class="w-full h-64 bg-[#0F0F12] border border-zinc-800 rounded-xl p-3 text-xs text-zinc-300 focus:outline-none focus:border-[#635BFF] font-mono" placeholder='{\n  "status": "success",\n  "tokens": 1024\n}'></textarea>
                </div>
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Required Explicit Keys (Comma Separated)</label>
                    <input type="text" id="json-keys" value="status, tokens" class="w-full bg-[#0F0F12] border border-zinc-800 rounded-lg p-2.5 text-xs text-white focus:outline-none mb-4 font-mono">
                    
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Validation Console</label>
                    <div id="lint-console" class="w-full h-44 bg-black border border-zinc-900 rounded-xl p-3 text-xs font-mono text-zinc-400 overflow-y-auto">
                        Awaiting structure input evaluation...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Sandboxed Operational Console Matrix</p>
    </footer>

    <script>
        function validateSchemaJSON() {
            const src = document.getElementById('json-target').value.trim();
            const keys = document.getElementById('json-keys').value.split(',').map(k => k.trim()).filter(Boolean);
            const consoleBox = document.getElementById('lint-console');

            if(!src) { consoleBox.className = "text-red-400 font-mono text-xs"; consoleBox.textContent = "Error: Input payload string empty."; return; }

            try {
                const parsed = JSON.parse(src);
                let missing = [];
                keys.forEach(k => { if(!(k in parsed)) missing.push(k); });

                if(missing.length > 0) {
                    consoleBox.className = "p-3 rounded bg-red-950/20 text-red-400 font-mono text-xs border border-red-900/40";
                    consoleBox.textContent = `CRITICAL: Schema Violation. Missing required key definition vectors: ${missing.join(', ')}`;
                } else {
                    consoleBox.className = "p-3 rounded bg-emerald-950/20 text-[#00FFC2] font-mono text-xs border border-emerald-900/40";
                    consoleBox.textContent = "SUCCESS: JSON passes validation limits. All required schema parameters present.";
                }
            } catch(e) {
                consoleBox.className = "p-3 rounded bg-red-950/20 text-red-400 font-mono text-xs border border-red-900/40";
                consoleBox.textContent = `MALFORMED SYNTAX: ${e.message}`;
            }
        }
    </script>
</body>
</html>

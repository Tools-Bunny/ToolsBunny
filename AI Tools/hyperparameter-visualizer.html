<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperparameter Visualizer - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <h1 class="text-2xl font-bold text-white border-b border-zinc-800 pb-4 mb-6">Model Hyperparameter Visualizer</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4 bg-[#0F0F12] border border-zinc-800 p-4 rounded-xl">
                    <div>
                        <label class="text-xs font-mono text-zinc-400 flex justify-between"><span>Temperature:</span><span id="v-temp" class="text-[#635BFF]">0.7</span></label>
                        <input type="range" id="p-temp" min="0" max="2" step="0.1" value="0.7" oninput="updateVisualizer()" class="w-full accent-[#635BFF]">
                    </div>
                    <div>
                        <label class="text-xs font-mono text-zinc-400 flex justify-between"><span>Top_P (Nucleus):</span><span id="v-topp" class="text-[#00FFC2]">0.9</span></label>
                        <input type="range" id="p-topp" min="0" max="1" step="0.05" value="0.9" oninput="updateVisualizer()" class="w-full accent-[#00FFC2]">
                    </div>
                </div>

                <div class="bg-black border border-zinc-900 rounded-xl p-4 flex flex-col justify-between">
                    <span class="text-[11px] font-mono text-zinc-500 uppercase block">Inference Strategy Simulation Profile</span>
                    <p id="simulation-verdict" class="text-xs leading-relaxed text-zinc-300 font-mono py-4">Evaluating weight structures...</p>
                    <span class="text-[10px] text-zinc-600">Altering metrics changes inference response entropy configurations.</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Static Interface Model Engine Tools</p>
    </footer>

    <script>
        function updateVisualizer() {
            const temp = parseFloat(document.getElementById('p-temp').value);
            const topp = parseFloat(document.getElementById('p-topp').value);
            
            document.getElementById('v-temp').textContent = temp.toFixed(1);
            document.getElementById('v-topp').textContent = topp.toFixed(2);

            let verdict = "Standard deterministic configuration. Balanced focus paths optimized for direct analytical context systems.";
            if (temp > 1.3) verdict = "High-entropy distribution. Model will exhibit maximum creative output variance, high risk of semantic drifting or vocabulary hallucination.";
            if (temp < 0.2) verdict = "Highly rigid state execution. Output tracks exact high-probability tokens. Exceptional profile alignment for structural syntax/JSON payloads.";
            if (topp < 0.4) verdict = "Constrained sample pool. Discards tail options aggressively. Text properties will feel highly repetitive across multi-turn chats.";

            document.getElementById('simulation-verdict').textContent = verdict;
        }
        updateVisualizer();
    </script>
</body>
</html>

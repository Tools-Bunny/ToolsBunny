<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Embedding Similarity Calculator - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
                <h1 class="text-2xl font-bold text-white">Local Embedding Similarity Calculator</h1>
                <button onclick="computeSimilarity()" class="bg-[#635BFF] text-white text-xs font-semibold px-4 py-1.5 rounded">Compute Similarity</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Vector Term Phrase Alpha</label>
                    <input type="text" id="v-alpha" value="Deploying AI systems on the web canvas" class="w-full bg-[#0F0F12] border border-zinc-800 rounded-lg p-2.5 text-xs text-white focus:outline-none">
                </div>
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Vector Term Phrase Beta</label>
                    <input type="text" id="v-beta" value="Building client-side applications with artificial intelligence" class="w-full bg-[#0F0F12] border border-zinc-800 rounded-lg p-2.5 text-xs text-white focus:outline-none">
                </div>
            </div>

            <div class="bg-black border border-zinc-900 rounded-xl p-5 text-center">
                <span class="text-[10px] uppercase font-mono text-zinc-500 block">Calculated Cosine Matrix Distance</span>
                <span id="similarity-score" class="text-4xl font-mono font-bold text-[#00FFC2] block mt-1">0.00%</span>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Mathematical Engine Environment Matrix</p>
    </footer>

    <script>
        function getTermFreqMap(str) {
            let words = str.toLowerCase().split(/\W+/).filter(Boolean);
            let map = {};
            words.forEach(w => map[w] = (map[w] || 0) + 1);
            return map;
        }

        function computeSimilarity() {
            const txtA = document.getElementById('v-alpha').value;
            const txtB = document.getElementById('v-beta').value;
            
            const mapA = getTermFreqMap(txtA);
            const mapB = getTermFreqMap(txtB);
            
            let dict = {...mapA, ...mapB};
            let dotProduct = 0, mA = 0, mB = 0;
            
            for (let k in dict) {
                let vA = mapA[k] || 0;
                let vB = mapB[k] || 0;
                dotProduct += vA * vB;
                mA += vA * vA;
                mB += vB * vB;
            }
            
            let sim = (mA && mB) ? (dotProduct / (Math.sqrt(mA) * Math.sqrt(mB))) : 0;
            document.getElementById('similarity-score').textContent = `${(sim * 100).toFixed(2)}%`;
        }
        computeSimilarity();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tone & Readability Dashboard - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-white">Tone & Readability Dashboard</h1>
                    <p class="text-xs text-zinc-400 mt-1">Audit complexity matrices and tone density values of generations locally.</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Source Prompt Corpus</label>
                    <textarea id="corpus-input" oninput="analyzeTone()" class="w-full h-64 bg-[#0F0F12] border border-zinc-800 rounded-xl p-3 text-xs text-zinc-300 focus:outline-none focus:border-[#635BFF]" placeholder="Paste model text parameters to isolate sentence structures..."></textarea>
                </div>
                
                <div class="bg-[#0F0F12] border border-zinc-800 rounded-xl p-4 flex flex-col justify-between">
                    <div>
                        <span class="text-xs font-mono text-zinc-400 block mb-3">Diagnostic Analysis</span>
                        <div class="space-y-3">
                            <div class="flex justify-between border-b border-zinc-900 pb-1.5">
                                <span class="text-[11px] text-zinc-500">Sentence Metrics</span>
                                <span id="metric-sentences" class="text-xs font-bold text-white font-mono">0</span>
                            </div>
                            <div class="flex justify-between border-b border-zinc-900 pb-1.5">
                                <span class="text-[11px] text-zinc-500">Avg Word Length</span>
                                <span id="metric-avg-word" class="text-xs font-bold text-[#00FFC2] font-mono">0.0</span>
                            </div>
                            <div class="flex justify-between border-b border-zinc-900 pb-1.5">
                                <span class="text-[11px] text-zinc-500">Complexity Grade</span>
                                <span id="metric-complexity" class="text-xs font-bold text-[#635BFF] font-mono">Low</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-black/40 p-3 rounded-lg border border-zinc-900 mt-4 text-center">
                        <span class="text-[9px] font-mono text-zinc-500 block uppercase">Algorithmic Profile</span>
                        <span id="metric-profile" class="text-xs font-semibold text-zinc-300 mt-1 block">Clear & Concise</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Sandbox Platform Integration Ecosystem</p>
    </footer>

    <script>
        function analyzeTone() {
            const val = document.getElementById('corpus-input').value.trim();
            if(!val) {
                document.getElementById('metric-sentences').textContent = "0";
                document.getElementById('metric-avg-word').textContent = "0.0";
                document.getElementById('metric-complexity').textContent = "None";
                document.getElementById('metric-profile').textContent = "Clear & Concise";
                return;
            }

            const sentences = val.split(/[.!?]+/).filter(s => s.trim().length > 0).length || 1;
            const words = val.split(/\s+/).filter(w => w.trim().length > 0);
            const totalChars = words.reduce((acc, curr) => acc + curr.length, 0);
            const avgWordLen = words.length ? (totalChars / words.length) : 0;

            document.getElementById('metric-sentences').textContent = sentences;
            document.getElementById('metric-avg-word').textContent = avgWordLen.toFixed(1);

            let grade = "Standard";
            let profile = "Editorial Direct";
            
            if(avgWordLen > 6) { grade = "Advanced (Academic)"; profile = "Complex & Dense Structure"; }
            else if(avgWordLen < 4.5 && sentences > 4) { grade = "Elementary Form"; profile = "Short Narrative Strands"; }

            document.getElementById('metric-complexity').textContent = grade;
            document.getElementById('metric-profile').textContent = profile;
        }
    </script>
</body>
</html>

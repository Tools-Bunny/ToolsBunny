<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Prompt Chunking Station - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-white">Smart Prompt Chunking Station</h1>
                    <p class="text-xs text-zinc-400 mt-1">Split massive corporate data pools or logs systematically across token windows.</p>
                </div>
                <button onclick="processChunks()" class="bg-[#635BFF] text-white text-xs font-semibold px-4 py-1.5 rounded">Execute Chunk Split</button>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-mono text-zinc-400 block mb-1">Max Character Capacity Limit per Chunk</label>
                        <input type="number" id="chunk-size" value="4000" class="w-full bg-[#0F0F12] border border-zinc-800 rounded-lg p-2 text-xs focus:outline-none focus:border-[#635BFF] font-mono">
                    </div>
                    <div>
                        <label class="text-xs font-mono text-zinc-400 block mb-1">Custom Context Prefix Anchor</label>
                        <input type="text" id="chunk-prefix" value="[PART {{index}}]:" class="w-full bg-[#0F0F12] border border-zinc-800 rounded-lg p-2 text-xs focus:outline-none focus:border-[#635BFF] font-mono">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Source Text Target File</label>
                    <textarea id="chunk-input" class="w-full h-44 bg-[#0F0F12] border border-zinc-800 rounded-xl p-3 text-xs text-zinc-300 focus:outline-none focus:border-[#635BFF]" placeholder="Paste the vast raw dataset payload asset data sequence here..."></textarea>
                </div>

                <div>
                    <label class="text-xs font-mono text-zinc-400 block mb-1">Processed Output Array Components</label>
                    <div id="chunk-output-zone" class="space-y-3 max-h-60 overflow-y-auto pr-2">
                        <div class="text-xs text-zinc-600 italic">Chunks wait generation mapping execution...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Data Infrastructure Workspace</p>
    </footer>

    <script>
        function processChunks() {
            const txt = document.getElementById('chunk-input').value;
            const size = parseInt(document.getElementById('chunk-size').value) || 2000;
            const prefix = document.getElementById('chunk-prefix').value;
            const container = document.getElementById('chunk-output-zone');

            if(!txt) { container.innerHTML = "<span class='text-xs text-red-400'>Error: Source target text parameter matrix is absent.</span>"; return; }

            let regex = new RegExp(`.{1,${size}}`, 'g');
            let basicChunks = txt.match(regex) || [];
            let outputHTML = "";

            basicChunks.forEach((chunk, i) => {
                let activePrefix = prefix.replace('{{index}}', i + 1);
                let finalVal = `${activePrefix}\n${chunk}`;
                outputHTML += `
                    <div class="p-3 bg-black border border-zinc-900 rounded-lg flex flex-col gap-2">
                        <div class="flex justify-between items-center"><span class="text-[10px] text-[#00FFC2] font-mono">CHUNK PACKET LAYER ${i+1} (${chunk.length} chars)</span><button onclick="navigator.clipboard.writeText(this.nextElementSibling.innerText); alert('Chunk segment cached!')" class="text-[10px] text-zinc-500 hover:text-white">Copy Segment</button><span class="hidden">${finalVal}</span></div>
                        <p class="text-xs font-mono text-zinc-400 line-clamp-3">${chunk}</p>
                    </div>`;
            });
            container.innerHTML = outputHTML;
        }
    </script>
</body>
</html>

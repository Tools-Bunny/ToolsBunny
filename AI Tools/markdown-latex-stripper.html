<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown & LaTeX Stripper - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-white">Markdown & LaTeX Stripper</h1>
                    <p class="text-xs text-zinc-400 mt-1">Strip formulas, weights, bold syntax markers, and algorithmic tokens from text files.</p>
                </div>
                <button onclick="navigator.clipboard.writeText(document.getElementById('clean-output').value); alert('Copied text!');" class="bg-[#00FFC2]/10 text-[#00FFC2] border border-[#00FFC2]/20 text-xs px-3 py-1.5 rounded">📋 Copy Output</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Raw Generation Input</label>
                    <textarea id="raw-input" oninput="stripText()" class="w-full h-72 bg-[#0F0F12] border border-zinc-800 rounded-xl p-3 text-xs text-zinc-300 focus:outline-none focus:border-[#635BFF]" placeholder="Paste string arrays containing **bold parameters** or $$E=mc^2$$ syntax equations..."></textarea>
                </div>
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Sanitized Raw Editorial Text</label>
                    <textarea id="clean-output" readonly class="w-full h-72 bg-[#0A0A0C] border border-zinc-900 rounded-xl p-3 text-xs text-zinc-400 focus:outline-none resize-none" placeholder="Clean semantic text output will populate here..."></textarea>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Private Client Pipeline Environment</p>
    </footer>

    <script>
        function stripText() {
            let text = document.getElementById('raw-input').value;
            
            // Technical Regex Arrays to remove Markdown syntax elements and LaTeX code wrappers cleanly
            text = text.replace(/\$\$[\s\S]*?\$\$/g, ''); // Display equations
            text = text.replace(/\$[\s\S]*?\$/g, '');     // Inline equations
            text = text.replace(/\\begin\{[\s\S]*?\\end\{.*?\}/g, ''); // Complex environments
            text = text.replace(/(\*\*|__)(.*?)\1/g, '$2'); // Bold
            text = text.replace(/(\*|_)(.*?)\1/g, '$2');   // Italic
            text = text.replace(/`([^`]+)`/g, '$1');       // Inline Code chunks
            text = text.replace(/#+\s+/g, '');             // Headers

            document.getElementById('clean-output').value = text;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media File Extension Format Picker - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <h1 class="text-2xl font-bold text-white border-b border-zinc-800 pb-4 mb-6">Asset Wrapper Inspector</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-[#0F0F12] border border-zinc-800 p-4 rounded-xl flex flex-col justify-center">
                    <label class="text-xs font-mono text-zinc-400 block mb-1">Evaluate Production File Extension</label>
                    <input type="file" id="media-asset" onchange="inspectWrapperExtension()" class="w-full text-xs text-zinc-400 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-zinc-800 file:text-white cursor-pointer">
                </div>

                <div class="bg-black border border-zinc-900 rounded-xl p-5 flex flex-col justify-between min-h-[140px]">
                    <span class="text-[10px] font-mono uppercase text-zinc-500 block">Metadata Analyzer Logs</span>
                    <p id="extension-log" class="text-xs font-mono text-zinc-400 py-2">Awaiting media target mapping matrices...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Sandboxed Operational Core Subsystems</p>
    </footer>

    <script>
        function inspectWrapperExtension() {
            const file = document.getElementById('media-asset').files[0];
            if(!file) return;

            const ext = file.name.split('.').pop().toUpperCase();
            let actionItem = "Valid secondary asset container detected.";
            
            if(ext === "MP4" || ext === "MOV") actionItem = "Optimal high-fidelity video container profile for direct deployment.";
            if(ext === "MP3" || ext === "WAV") actionItem = "Audio track format wrapper asset validated successfully.";

            document.getElementById('extension-log').innerHTML = `
                <span class="text-[#635BFF]">DETECTED:</span> .${ext}<br>
                <span class="text-[#00FFC2]">PIPELINE TIP:</span> ${actionItem}
            `;
        }
    </script>
</body>
</html>

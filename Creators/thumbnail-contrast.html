<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Text Contrast Analyzer - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <h1 class="text-2xl font-bold text-white border-b border-zinc-800 pb-4 mb-6">Thumbnail Contrast Optimizer</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-[#0F0F12] border border-zinc-800 p-4 rounded-xl space-y-4">
                    <div>
                        <label class="text-xs font-mono text-zinc-400 block mb-1">Text Fill Overlay Color</label>
                        <input type="color" id="text-color" value="#FFE600" onchange="analyzeContrast()" class="w-full h-10 bg-black p-1 rounded cursor-pointer border border-zinc-800">
                    </div>
                    <div>
                        <label class="text-xs font-mono text-zinc-400 block mb-1">Graphic Background Base</label>
                        <input type="color" id="bg-color" value="#0A0A14" onchange="analyzeContrast()" class="w-full h-10 bg-black p-1 rounded cursor-pointer border border-zinc-800">
                    </div>
                </div>

                <div class="bg-black border border-zinc-900 rounded-xl p-5 flex flex-col justify-between items-center text-center">
                    <div id="contrast-preview" class="w-full p-4 rounded text-center font-bold text-lg border border-zinc-800" style="color: #FFE600; background-color: #0A0A14;">
                        SAMPLE TEXT FEED
                    </div>
                    <div class="mt-4">
                        <span class="text-[10px] font-mono text-zinc-500 uppercase block">Calculated Contrast Ratio</span>
                        <span id="contrast-ratio-score" class="text-2xl font-mono font-bold text-[#00FFC2]">18.5:1</span>
                        <span id="contrast-verdict" class="text-xs text-zinc-400 block mt-1">Passes all feed legibility guidelines.</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Local Graphics Evaluation Sandbox</p>
    </footer>

    <script>
        function hexToRgb(hex) {
            const num = parseInt(hex.replace("#",""), 16);
            return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
        }
        function getLuminance(r, g, b) {
            let a = [r, g, b].map(v => {
                v /= 255;
                return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
            });
            return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
        }
        function analyzeContrast() {
            const txtHex = document.getElementById('text-color').value;
            const bgHex = document.getElementById('bg-color').value;

            const preview = document.getElementById('contrast-preview');
            preview.style.color = txtHex;
            preview.style.backgroundColor = bgHex;

            const rgbTxt = hexToRgb(txtHex);
            const rgbBg = hexToRgb(bgHex);

            const lum1 = getLuminance(rgbTxt.r, rgbTxt.g, rgbTxt.b);
            const lum2 = getLuminance(rgbBg.r, rgbBg.g, rgbBg.b);

            const ratio = (Math.max(lum1, lum2) + 0.05) / (Math.min(lum1, lum2) + 0.05);
            
            document.getElementById('contrast-ratio-score').textContent = `${ratio.toFixed(1)}:1`;
            
            const verdict = document.getElementById('contrast-verdict');
            if(ratio >= 4.5) {
                verdict.textContent = "Passes readability thresholds cleanly.";
                verdict.className = "text-xs text-[#00FFC2] block mt-1";
            } else {
                verdict.textContent = "Low readability. Text will blend on small mobile layouts.";
                verdict.className = "text-xs text-red-400 block mt-1";
            }
        }
    </script>
</body>
</html>

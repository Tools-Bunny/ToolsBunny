<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Sponsorship Cost Calculator - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <h1 class="text-2xl font-bold text-white border-b border-zinc-800 pb-4 mb-6">Sponsorship Rate Engine</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-[#0F0F12] border border-zinc-800 p-4 rounded-xl space-y-4">
                    <div>
                        <label class="text-xs font-mono text-zinc-400 block mb-1">Expected Baseline Impressions</label>
                        <input type="number" id="v-views" value="50000" oninput="calculateSponsorBudget()" class="w-full bg-black border border-zinc-800 rounded p-2 text-xs text-white font-mono">
                    </div>
                    <div>
                        <label class="text-xs font-mono text-zinc-400 block mb-1">Target Niche CPM Rate ($)</label>
                        <input type="number" id="v-cpm" value="25" oninput="calculateSponsorBudget()" class="w-full bg-black border border-zinc-800 rounded p-2 text-xs text-white font-mono">
                    </div>
                </div>

                <div class="bg-black border border-zinc-900 rounded-xl p-5 flex flex-col justify-center text-center">
                    <span class="text-[10px] font-mono text-zinc-500 uppercase block">Calculated Campaign Integration Fee</span>
                    <span id="calculated-payout-cost" class="text-4xl font-mono font-bold text-[#00FFC2] my-2">$1,250.00</span>
                    <span class="text-[10px] text-zinc-600 font-mono">Standard industry configuration factoring complete integration models.</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Strategic Campaign Ad-Systems</p>
    </footer>

    <script>
        function calculateSponsorBudget() {
            const views = parseFloat(document.getElementById('v-views').value) || 0;
            const cpm = parseFloat(document.getElementById('v-cpm').value) || 0;

            const fee = (views / 1000) * cpm;
            document.getElementById('calculated-payout-cost').textContent = `$${fee.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Safe-Zone Template Overlay - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <h1 class="text-2xl font-bold text-white border-b border-zinc-800 pb-4 mb-6">Vertical Feed Safe-Zone Mask</h1>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-[#0F0F12] border border-zinc-800 p-4 rounded-xl space-y-4 h-fit">
                    <span class="text-xs font-mono text-zinc-400 block uppercase">Overlay Toggles</span>
                    <label class="flex items-center space-x-2 text-xs font-mono text-zinc-300 cursor-pointer">
                        <input type="checkbox" id="toggle-sidebar" checked onchange="toggleMaskElements()" class="accent-[#635BFF]">
                        <span>Mock UI Sidebar Assets</span>
                    </label>
                    <label class="flex items-center space-x-2 text-xs font-mono text-zinc-300 cursor-pointer">
                        <input type="checkbox" id="toggle-footer" checked onchange="toggleMaskElements()" class="accent-[#635BFF]">
                        <span>Mock UI Copy Bounds</span>
                    </label>
                </div>

                <div class="md:col-span-2 bg-black border border-zinc-900 rounded-xl p-6 flex justify-center items-center">
                    <div class="w-56 h-96 bg-zinc-900/30 border border-zinc-800 rounded-lg relative overflow-hidden flex items-center justify-center">
                        <span class="text-[10px] font-mono text-zinc-600 uppercase">Video Content Space</span>
                        
                        <div id="mock-sidebar" class="absolute right-2 bottom-24 w-8 flex flex-col gap-3 items-center">
                            <div class="w-6 h-6 rounded-full bg-zinc-800/80 border border-zinc-700 flex items-center justify-center text-[8px] text-white">❤️</div>
                            <div class="w-6 h-6 rounded-full bg-zinc-800/80 border border-zinc-700 flex items-center justify-center text-[8px] text-white">💬</div>
                            <div class="w-6 h-6 rounded-full bg-zinc-800/80 border border-zinc-700 flex items-center justify-center text-[8px] text-white">🔄</div>
                        </div>

                        <div id="mock-footer" class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-black/80 to-transparent">
                            <div class="w-3/4 h-2 bg-zinc-700/60 rounded mb-1.5"></div>
                            <div class="w-1/2 h-2 bg-zinc-700/40 rounded"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Layout Protection Systems</p>
    </footer>

    <script>
        function toggleMaskElements() {
            const side = document.getElementById('mock-sidebar');
            const foot = document.getElementById('mock-footer');

            side.style.display = document.getElementById('toggle-sidebar').checked ? 'flex' : 'none';
            foot.style.display = document.getElementById('toggle-footer').checked ? 'block' : 'none';
        }
    </script>
</body>
</html>

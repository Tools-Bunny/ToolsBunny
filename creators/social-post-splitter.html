<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Post Splitter - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
                <h1 class="text-2xl font-bold text-white">Post Character Segmenter</h1>
                <button onclick="sliceThread()" class="bg-[#00FFC2] text-black text-xs font-bold px-4 py-1.5 rounded">Generate Thread</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Long-Form Core Text Copy</label>
                    <textarea id="thread-source" class="w-full h-44 bg-[#0F0F12] border border-zinc-800 rounded-xl p-3 text-xs text-zinc-300 focus:outline-none focus:border-[#635BFF]" placeholder="Paste substantial content narratives here to slice safely into single thread post items..."></textarea>
                </div>

                <div id="thread-output-canvas" class="space-y-3">
                    <div class="text-xs text-zinc-600 italic">Segments will build here sequentially...</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Publishing Pipeline</p>
    </footer>

    <script>
        function sliceThread() {
            const txt = document.getElementById('thread-source').value.trim();
            const container = document.getElementById('thread-output-canvas');
            if(!txt) return;

            let words = txt.split(' ');
            let chunks = [];
            let currentChunk = "";

            words.forEach(word => {
                if((currentChunk + " " + word).length > 260) {
                    chunks.push(currentChunk.trim());
                    currentChunk = word;
                } else {
                    currentChunk += " " + word;
                }
            });
            if(currentChunk) chunks.push(currentChunk.trim());

            let html = "";
            chunks.forEach((chunk, idx) => {
                let finalStr = `${chunk} (${idx + 1}/${chunks.length})`;
                html += `
                    <div class="p-3 bg-black border border-zinc-900 rounded-lg flex flex-col gap-2 font-mono">
                        <div class="flex justify-between items-center text-[10px] text-[#635BFF]"><span>SEGMENT ITEM ${idx+1}</span><button onclick="navigator.clipboard.writeText(this.nextElementSibling.innerText); alert('Copied post slice!');" class="hover:underline text-zinc-400">Copy Text</button><span class="hidden">${finalStr}</span></div>
                        <p class="text-xs text-zinc-300">${finalStr}</p>
                    </div>`;
            });
            container.innerHTML = html;
        }
    </script>
</body>
</html>

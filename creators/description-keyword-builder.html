<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Description & Keyword Generator - Toolsbunny</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --bg-obsidian: #080808; --card-void: #16161A; --accent-stripe: #635BFF; --accent-mint: #00FFC2; }
        body { background-color: var(--bg-obsidian); color: #E4E4E7; font-family: system-ui, -apple-system, sans-serif; }
        .pulse-shell { background-color: var(--card-void); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full border-b border-zinc-800 bg-black/50 backdrop-blur-md fixed top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html"><img src="https://github.com/ToolsBunny/toolsbunny/blob/main/logo.png?raw=true" alt="Logo" class="h-12 w-auto"></a>
            <a href="../index.html" class="text-sm text-zinc-400 hover:text-white">← Matrix</a>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 pt-32 pb-16 flex-grow">
        <div id="pulse-ad-slot" class="w-full mb-8 p-4 bg-[#16161A] border border-dashed border-zinc-800 rounded-xl flex items-center justify-center min-h-[90px]">
            <span class="text-xs text-zinc-600 font-mono uppercase">#pulse-ad-slot</span>
        </div>

        <div class="pulse-shell rounded-2xl p-6 md:p-8">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-white">Metadata & Keyword Builder</h1>
                    <p class="text-xs text-zinc-400 mt-1">Compile descriptions, contextual links, and tags into structured video templates.</p>
                </div>
                <button onclick="copyMetadataDescription()" class="bg-[#635BFF] text-white text-xs px-3 py-1.5 rounded">Copy Metadata</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-mono text-zinc-400 block mb-1">Core Topic Summary</label>
                        <input type="text" id="meta-topic" oninput="compileMetadata()" class="w-full bg-[#0F0F12] border border-zinc-800 rounded-lg p-2.5 text-xs text-white focus:outline-none" placeholder="e.g., High-frequency algorithmic trading breakdown">
                    </div>
                    <div>
                        <label class="text-xs font-mono text-zinc-400 block mb-1">Resource Links (One Per Line)</label>
                        <textarea id="meta-links" oninput="compileMetadata()" class="w-full h-20 bg-[#0F0F12] border border-zinc-800 rounded-lg p-2 text-xs text-white focus:outline-none font-mono" placeholder="https://toolsbunny.com"></textarea>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-mono text-zinc-500 block mb-1">Compiled Algorithmic Description Matrix</label>
                    <textarea id="meta-output" readonly class="w-full h-52 bg-black border border-zinc-900 rounded-xl p-3 text-xs text-zinc-400 font-mono focus:outline-none resize-none"></textarea>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-zinc-900 bg-black/80 px-6 py-6 text-xs text-zinc-600 text-center">
        <p>Toolsbunny Static Asset Factory Pipeline</p>
    </footer>

    <script>
        function compileMetadata() {
            const topic = document.getElementById('meta-topic').value.trim();
            const links = document.getElementById('meta-links').value.split('\n').filter(Boolean);
            
            if(!topic) {
                document.getElementById('meta-output').value = "Awaiting structural topic configuration metrics...";
                return;
            }

            let computedTags = topic.toLowerCase().split(' ').map(w => `#${w.replace(/\W/g, '')}`).slice(0, 4).join(' ');
            let output = `📌 VIDEO SUMMARY\nIn this video, we take an in-depth look into everything surrounding ${topic}. Make sure to subscribe to stay updated with more tactical breakdowns!\n\n`;
            
            if(links.length > 0) {
                output += `🔗 RESOURCES & LINKS\n`;
                links.forEach(l => output += `• ${l.trim()}\n`);
                output += `\n`;
            }
            
            output += `🔍 TARGET TAGS\n${computedTags}\n\nProcessed securely via Toolsbunny.`;
            document.getElementById('meta-output').value = output;
        }
        compileMetadata();
    </script>
</body>
</html>
